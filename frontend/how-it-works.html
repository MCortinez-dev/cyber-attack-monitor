<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture | How it works</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="stylesheet" href="how-style.css">
</head>
<body>

    <main class="architecture-wrapper">
        <div class="relative-container">
            <img src="img/how-it-works.png" alt="Architecture Diagram" class="main-img">

            <header class="header-overlay">
                <h2>SYSTEM ARCHITECTURE FLOW</h2>
            </header>

            <div class="element-wrapper git-pos">
                <div class="arrow-animated arrow-to-git"></div>
                <a href="https://github.com/MCortinez-dev" target="_blank" class="bubble-btn">
                    <img src="img/git.png" alt="GitHub">
                    <span class="label">GITHUB REPO</span>

            </div>

            <div class="element-wrapper map-pos">
                <div class="arrow-animated arrow-from-vercel"></div>
                <a href="index.html" class="bubble-btn">
                    <img src="img/favicon.ico" alt="Map">
                    <span class="label">LIVE MAP</span>
                </a>
            </div>
        </div>
